<svg [@tileSlide]="tile.type + tile.rotation + tile.treasure" [attr.width]="size" [attr.height]="size" [attr.viewBox]="'0 0 80 80'"
     class="tile-svg transition-all duration-300"
     [class.tile-highlighted]="highlighted"
     [class.tile-selected]="selected">

  <!-- Stone background -->
  <rect width="80" height="80" rx="4" fill="#2d1f14" />

  <!-- Decorative stone texture lines -->
  <line x1="0" y1="20" x2="80" y2="20" stroke="#3a2a1a" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="40" x2="80" y2="40" stroke="#3a2a1a" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="60" x2="80" y2="60" stroke="#3a2a1a" stroke-width="0.5" opacity="0.5"/>

  <!-- Path corridors (22px wide, warm sandy color) -->
  @if (tile.paths.north) {
    <rect x="29" y="0" width="22" height="41" fill="#c8a96e" rx="2"/>
  }
  @if (tile.paths.south) {
    <rect x="29" y="39" width="22" height="41" fill="#c8a96e" rx="2"/>
  }
  @if (tile.paths.east) {
    <rect x="39" y="29" width="41" height="22" fill="#c8a96e" rx="2"/>
  }
  @if (tile.paths.west) {
    <rect x="0" y="29" width="41" height="22" fill="#c8a96e" rx="2"/>
  }

  <!-- Center fill to connect corridors -->
  <rect x="29" y="29" width="22" height="22" fill="#c8a96e"/>

  <!-- Gold border/ornament -->
  <rect x="29" y="29" width="22" height="22" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.6"/>

  <!-- Treasure icon -->
  @if (tile.treasure) {
    <image [attr.href]="'icons/' + tile.treasure + '.svg'"
           x="22" y="22" width="36" height="36"
           style="filter: drop-shadow(0 0 3px #d4a017)"/>
  }

  <!-- Highlight overlay for reachable fields -->
  @if (highlighted) {
    <rect width="80" height="80" rx="4" fill="#d4a017" opacity="0.15"/>
  }
</svg>
