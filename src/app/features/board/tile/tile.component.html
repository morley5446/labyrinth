<div class="tile-container relative overflow-hidden"
     [style.width.px]="size" [style.height.px]="size"
     [@tileSlide]="tile.type + tile.rotation + tile.treasure"
     [class.tile-highlighted]="highlighted"
     [class.tile-selected]="selected">

  <!-- 5×5 sprite grid (5 × 16px = 80px) -->
  <div class="sprite-grid absolute inset-0">
    @for (cell of cells; track $index) {
      <div class="sprite-cell" [style.background-position]="bgPos(cell)"></div>
    }
  </div>

  <!-- Treasure icon centred on tile -->
  @if (tile.treasure) {
    <img [src]="'icons/' + tile.treasure + '.jpg'"
         class="absolute pointer-events-none treasure-icon"
         [alt]="tile.treasure" />
  }

  <!-- Reachable highlight overlay -->
  @if (highlighted) {
    <div class="absolute inset-0 pointer-events-none highlight-overlay"></div>
  }

</div>
